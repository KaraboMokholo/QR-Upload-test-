<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload Files</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="container">
  <h1>Upload Files</h1>
  <p>Send photos, videos, documents to someone via their QR code.</p>

  <form id="uploadForm">
    <label for="files">Choose files (multiple allowed)</label>
    <input type="file" id="files" multiple accept="image/*,video/*,.pdf,.doc,.docx,.txt"/>

    <button type="submit">Upload</button>
  </form>

  <div id="message" class="message" style="display:none;"></div>

  <div id="preview" class="preview-gallery"></div>
</div>

<script src="script.js"></script>
<script>
// ────────────────────────────────────────────────
const form = document.getElementById('uploadForm');
const message = document.getElementById('message');
const preview = document.getElementById('preview');

let targetUid = getUrlParam('uid');

if (!targetUid) {
  message.textContent = 'No user ID found in link. Please scan the correct QR code.';
  message.className = 'message error';
  message.style.display = 'block';
  form.style.display = 'none';
}

form.addEventListener('submit', e => {
  e.preventDefault();
  if (!targetUid) return;

  const files = document.getElementById('files').files;
  if (files.length === 0) return alert('Select at least one file');

  preview.innerHTML = '';
  message.style.display = 'none';

  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = function(ev) {
      const dataUrl = ev.target.result;

      // "Save" to fake database
      addUploadForUser(targetUid, {
        name: file.name,
        type: file.type,
        size: file.size,
        dataUrl: dataUrl,
        uploadedAt: new Date().toISOString()
      });

      // Show preview
      const div = document.createElement('div');
      div.className = 'preview-item';

      if (file.type.startsWith('image/')) {
        const img = document.createElement('img');
        img.src = dataUrl;
        div.appendChild(img);
      } else if (file.type.startsWith('video/')) {
        const video = document.createElement('video');
        video.src = dataUrl;
        video.controls = true;
        div.appendChild(video);
      } else {
        const p = document.createElement('p');
        p.textContent = `Uploaded: ${file.name}`;
        div.appendChild(p);
      }

      preview.appendChild(div);
    };
    reader.readAsDataURL(file);
  });

  message.textContent = 'Files uploaded successfully! ✓';
  message.className = 'message success';
  message.style.display = 'block';
});
</script>
</body>
</html>
